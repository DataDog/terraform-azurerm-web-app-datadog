name: E2E Tests

# End-to-end conformance suite for the Datadog Web App module, per
# serverless-ci/e2e/spec.md. Provisions a real Azure Linux Web App, verifies
# config + telemetry + idempotency, and tears everything down.
#
# Gated behind path filters and a SKIP_AAS_TESTS flag so it only runs when the
# module or the suite itself changes. Auth uses GitHub -> Azure OIDC federation
# (no long-lived cloud credentials).

permissions:
  contents: read

on:
  workflow_dispatch: {}
  pull_request:
    paths:
      - 'modules/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'
  push:
    branches:
      - main
    paths:
      - 'modules/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yaml'

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.filter.outputs.module }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            module:
              - 'modules/linux/**'
              - 'e2e/**'
              - '.github/workflows/e2e.yaml'

  e2e:
    name: Linux Web App e2e
    runs-on: ubuntu-latest
    needs: [changes]
    permissions:
      contents: read
      id-token: write # required for Azure OIDC federation
    env:
      # Skip the cloud lifecycle only when no relevant files changed; unit tests
      # still run. When relevant files change the lifecycle runs for real and the
      # Azure OIDC / dd-sts steps must succeed -- an auth failure fails the job.
      SKIP_AAS_TESTS: ${{ needs.changes.outputs.should_run != 'true' }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Go
        uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
          go-version-file: e2e/go.mod
          cache-dependency-path: e2e/go.sum

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: 1.5.7
          terraform_wrapper: false

      - name: Azure login (OIDC)
        if: needs.changes.outputs.should_run == 'true'
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID_E2E }}
          tenant-id: ${{ vars.AZURE_TENANT_ID_E2E }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_E2E }}

      # Short-lived Datadog API + App keys via OIDC federation (dd-sts), governed by
      # the policy in dd-source. No static Datadog keys are stored in this repo.
      - name: Get Datadog credentials (dd-sts)
        id: dd-sts
        if: needs.changes.outputs.should_run == 'true'
        uses: DataDog/dd-sts-action@2e8187910199bd93129520183c093e19aa585c75 # v1.0.0
        with:
          policy: terraform-azurerm-web-app-datadog-e2e

      - name: Run e2e suite
        working-directory: e2e
        run: go test -v -timeout 45m ./...
        env:
          GO111MODULE: on
          # Azure
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_E2E }}
          ARM_USE_OIDC: 'true'
          ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID_E2E }}
          ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID_E2E }}
          ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_E2E }}
          # Datadog
          DD_SITE: ${{ vars.DD_SITE_E2E || 'datadoghq.com' }}
          # Datadog: keys used to query the API for telemetry
          DATADOG_API_KEY: ${{ steps.dd-sts.outputs.api_key }}
          DATADOG_APP_KEY: ${{ steps.dd-sts.outputs.app_key }}
          # Workload artifact + pinned sidecar
          E2E_STORAGE_ACCOUNT: ${{ vars.E2E_STORAGE_ACCOUNT }}
          E2E_SIDECAR_IMAGE: ${{ vars.E2E_SIDECAR_IMAGE }}
